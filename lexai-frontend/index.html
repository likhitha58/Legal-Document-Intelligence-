<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexAI | Intelligent Legal Document Analysis</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">⚖️</span>
                <h1>LexAI</h1>
            </div>
            <div class="status-badge" id="backend-status">
                <span class="dot"></span> Backend: <span id="status-text">Connecting...</span>
            </div>
        </header>

        <main>
            <section class="hero">
                <h2>Precision Legal Intelligence</h2>
                <p>Query your contracts with AI-powered semantic search and RAG technology.</p>
            </section>

            <div class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="message system">
                        <p>Welcome to LexAI. Ask me anything about the loaded contracts.</p>
                    </div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="query-input" placeholder="e.g., What are the termination conditions?" autocomplete="off">
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <section class="metadata-panel" id="metadata-panel" style="display: none;">
                <h3>Source Excerpts</h3>
                <div id="sources-list" class="sources-list"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Legal Document Intelligence System. Powered by Gemini & FAISS.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
