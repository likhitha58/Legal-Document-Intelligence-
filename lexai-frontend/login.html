<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LexAI</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="page-fade">

  <div class="split-layout">
    <div class="split-left">
      <a class="playfair d-flex align-items-center gap-2 mb-5" href="index.html" style="color: #fff; font-size:2rem; font-weight: 700; text-decoration: none;">
        <img src="assets/logo.svg" alt="LexAI Logo" width="40" height="40" class="text-white">
        LexAI
      </a>
      <h2 class="playfair mb-4">Legal Intelligence Platform</h2>
      <ul class="list-unstyled lead fs-5">
        <li class="mb-3"><i class="bi bi-shield-check text-accent me-2"></i> Secure Document Storage</li>
        <li class="mb-3"><i class="bi bi-robot text-accent me-2"></i> AI-Powered Extraction</li>
        <li class="mb-3"><i class="bi bi-lightning-charge text-accent me-2"></i> Fast & Accurate Analysis</li>
      </ul>
    </div>
    
    <div class="split-right">
      <div style="max-width: 420px; width: 100%; margin: 0 auto;">
        <h3 class="playfair fw-bold mb-2">Welcome Back</h3>
        <p class="text-muted mb-4">Sign in to your LexAI account</p>
        
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-medium">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="login-email" class="form-control" placeholder="name@company.com" required>
            </div>
          </div>
          
          <div class="mb-3">
            <div class="d-flex justify-content-between">
              <label class="form-label fw-medium">Password</label>
              <a href="#" class="small text-decoration-none">Forgot password?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
              <button class="btn btn-outline-secondary border-start-0 border" type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<i class=\'bi bi-eye\'></i>':'<i class=\'bi bi-eye-slash\'></i>';">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
          </div>
          
          <button type="submit" id="login-btn" class="btn btn-primary w-100 py-2 mb-4">Sign In</button>
        </form>
        
        <div class="d-flex align-items-center mb-4">
          <hr class="flex-grow-1">
          <span class="mx-3 text-muted small">or continue with</span>
          <hr class="flex-grow-1">
        </div>
        
        <button type="button" class="btn btn-outline-secondary w-100 py-2 d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-google text-danger"></i> Google SSO
        </button>
        
        <div class="text-center mt-5">
          <p class="text-muted small">Don't have an account? <a href="register.html" class="fw-bold text-decoration-none">Register here</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5.3 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="js/app.js"></script>
</body>
</html>
